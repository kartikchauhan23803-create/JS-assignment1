<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let day = 7;
        let dayname;
        switch (day) {
            case 1 :document.write('<br> day is monday') +(dayname = "monday");
            break;
             case 2 :document.write('<br> day is tuesday') +(dayname = "tuesday");
            break;
             case 3 :document.write('<br> day is wednesday') +(dayname = "wednesday");
            break;
             case 4 : document.write('<br> day is thursday') +(dayname = "thursday");
            break;
             case 5 :document.write('<br> day is firday') +(dayname = "friday");
            break;
             case 6 : document.write('<br> day is saturday') +(dayname = "saturday");
            break;
            default: document.write('<br> day is sunday(weekend)') +(dayname = "sunday");
            break;
        }
    </script>
</body>
</html>
