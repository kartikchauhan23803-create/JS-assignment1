<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // JavaScript Program using Arithmetic, Comparison, and Logical Operators

let a = 20;
let b = 5;

// Arithmetic Operators
console.log("Addition:", a + b);
console.log("Subtraction:", a - b);
console.log("Multiplication:", a * b);
console.log("Division:", a / b);

// Comparison Operators
console.log("Are both numbers equal?", a == b);
console.log("Is a greater than b?", a > b);

// Logical Operators
console.log("Is a > 10 AND b < 5 ?", a > 10 && b < 5);
console.log("Is a > 10 OR b < 5 ?", a > 10 || b < 5);
console.log("Negation of condition:", !(a > 10));
        
    </script>
</body>
</html>
